<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>World Resource Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0d0d;
  --panel: rgba(20,20,20,0.95);
  --border: #333;
  --accent: #FF6600;
  --text: #ffffff;
  --text-sec: #A0A0A0;
  --oil: #FF6600;
  --lng: #00AAFF;
  --minerals: #FFD700;
  --agri: #00CC66;
  --route-oil: rgba(255,102,0,0.5);
  --route-lng: rgba(0,170,255,0.5);
  --route-minerals: rgba(255,215,0,0.5);
  --route-agri: rgba(0,204,102,0.5);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 2px;
}
.header span {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: var(--text-sec);
}
.controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-sec);
  padding: 6px 10px;
  font-size: 10px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  min-height: 44px;
  min-width: 44px;
}
.btn:hover, .btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,102,0,0.1);
}
.zoom-controls {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.btn-zoom {
  width: 44px;
  height: 44px;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.map-container {
  width: 100%;
  overflow: hidden;
  position: relative;
}
#map {
  display: block;
  width: 100%;
  height: auto;
  min-height: 50vh;
}
.continent { fill: #1a1a1a; stroke: #333; stroke-width: 0.5; }
.country { fill: #222; stroke: #2a2a2a; stroke-width: 0.3; }
.ocean { fill: #0a0a0a; }
.chokepoint {
  cursor: pointer;
  transition: transform 0.2s;
}
.chokepoint:hover { transform: scale(1.3); }
.chokepoint-pulse {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { opacity: 0.8; }
  50% { opacity: 0.3; }
  100% { opacity: 0.8; }
}
.resource-zone { cursor: pointer; transition: transform 0.2s; }
.resource-zone:hover { transform: scale(1.2); }
.route { pointer-events: stroke; cursor: pointer; }
.route:hover { stroke-width: 3; }
.popup-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
}
.popup {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: 8px 8px 0 0;
  padding: 15px;
  z-index: 201;
  max-height: 70vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.popup-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-sec);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.popup-close:hover { border-color: var(--accent); color: var(--accent); }
.popup h2 {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 10px;
  padding-right: 40px;
}
.popup-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.popup-row:last-child { border-bottom: none; }
.popup-label { color: var(--text-sec); font-family: 'Courier New', monospace; }
.popup-value { color: var(--text); font-family: 'Courier New', monospace; text-align: right; }
.popup-section {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.popup-section h3 {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 8px;
  font-family: 'Courier New', monospace;
}
.legend {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 12px;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
}
.legend-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  padding-bottom: 8px;
}
.legend-toggle h3 {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--text-sec);
}
.legend-toggle span { color: var(--text-sec); font-size: 12px; }
.legend-items {
  display: none;
  flex-wrap: wrap;
  gap: 12px;
  padding-top: 8px;
}
.legend-items.show { display: flex; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-sec);
}
.legend-circle {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
.legend-line {
  width: 24px;
  height: 3px;
  border-radius: 2px;
}
.legend-pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}
@media (min-width: 768px) {
  .popup {
    top: 50%;
    left: 50%;
    bottom: auto;
    transform: translate(-50%, -50%);
    max-width: 400px;
    border-radius: 8px;
  }
  .legend {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 10px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .map-container { padding-bottom: 80px; }
}
</style>
</head>

}

    const target = btn.dataset.toggle;
    const el = document.getElementById(target);
    if (!el) return;
    const isActive = btn.classList.contains('active');
    btn.classList.toggle('active');
    el.style.display = isActive ? 'none' : 'block';
  });
});
