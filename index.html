<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Chokepoints</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#header{padding:14px 16px;background:#0f0f0f;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;position:fixed;top:0;left:0;right:0;z-index:1000}
#header h1{font-size:13px;font-weight:700;color:#FF6600;letter-spacing:2px}
#header p{font-size:10px;color:#666;margin-top:2px}
#map{width:100%;height:100vh}
#panel{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid #FF6600;border-radius:20px 20px 0 0;padding:20px 18px 40px;transform:translateY(100%);transition:transform .3s ease;z-index:1000;max-height:75vh;overflow-y:auto}
#panel.open{transform:translateY(0)}
.panel-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 14px}
#panelTitle{font-size:18px;font-weight:700;color:#FF6600;margin-bottom:4px}
#panelSub{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.panel-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #222;gap:12px}
.panel-label{font-size:11px;color:#888;flex-shrink:0}
.panel-value{font-size:12px;font-family:'Courier New',monospace;color:#fff;text-align:right}
.panel-section{margin-top:12px;padding:12px;background:rgba(255,102,0,.08);border:1px solid rgba(255,102,0,.2);border-radius:8px}
.panel-section h4{font-size:9px;color:#FF6600;letter-spacing:1.5px;margin-bottom:6px;text-transform:uppercase}
.panel-section p{font-size:12px;line-height:1.6;color:#ccc}
.panel-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:1px solid #333;background:#1a1a1a;color:#888;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.legend{position:fixed;bottom:20px;left:14px;background:rgba(17,17,17,.92);border:1px solid #222;border-radius:10px;padding:10px 14px;z-index:500;backdrop-filter:blur(8px)}
.legend h3{font-size:8px;color:#666;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;font-family:'Courier New',monospace}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leaflet-popup-content-wrapper{background:#111;border:1px solid #333;border-radius:10px}
.leaflet-popup-tip{background:#111}
.leaflet-popup-content{color:#e0e0e0;font-family:-apple-system,sans-serif;font-size:12px;margin:12px}
.leaflet-container{background:#0a0a0a}
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>GLOBAL CHOKEPOINTS</h1>
    <p>Strategic Trade Intelligence</p>
  </div>
</div>
<div id="map"></div>
<div class="legend">
  <h3>Legend</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#FF6600"></div> Chokepoint</div>
  <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Oil</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00AAFF"></div> Gas/LNG</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FFD700"></div> Minerals</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00CC66"></div> Agriculture</div>
</div>
<div id="panel">
  <div class="panel-handle"></div>
  <button class="panel-close" onclick="closePanel()">×</button>
  <div id="panelTitle">Title</div>
  <div id="panelSub">Type</div>
  <div id="panelBody"></div>
</div>
<script>
// Leaflet map - high fidelity using OpenStreetMap tiles
const map = L.map('map', {
  center: [20, 10],
  zoom: 2,
  minZoom: 2,
  maxZoom: 8,
  worldCopyJump: true,
  zoomControl: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);

// Custom markers
const chokepoints = [
  {id:'hormuz',name:'Strait of Hormuz',lat:26.5,lon:56.5,stats:[
    {l:'Daily Oil Flow',v:'21M bbl/day'},
    {l:'% World Oil',v:'20%'},
    {l:'Width',v:'21 miles'},
    {l:'Depth',v:'230 ft'},
  ],risk:'HIGH',whatIf:'Full closure: +$20-40/barrel within days. Europe and Asia scramble. Saudi routes shift south to Bab-el-Mandeb.'},
  {id:'malacca',name:'Strait of Malacca',lat:2.5,lon:100.5,stats:[
    {l:'Annual Trade Value',v:'$3.4 Trillion'},
    {l:'% World Trade',v:'25%'},
    {l:'Width (narrowest)',v:'1.7 miles'},
    {l:'Ships/Year',v:'94,000'},
  ],risk:'LOW',whatIf:'Closure: China-Japan-Korea trade detour via Lombok adds 3-5 days and $50B/yr in extra costs.'},
  {id:'suez',name:'Suez Canal',lat:30.3,lon:32.3,stats:[
    {l:'Annual Trade',v:'$1.4 Trillion'},
    {l:'% World Trade',v:'12%'},
    {l:'Ships/Year',v:'19,000'},
    {l:'Avg Delay (blockage)',v:'6 days'},
  ],risk:'MODERATE',whatIf:'2021 Ever Given: $9.6B/day delayed. Full closure: Europe-Asia via Cape of Good Hope (+2 weeks, +$1M fuel/ship).'},
  {id:'panama',name:'Panama Canal',lat:9.1,lon:-80.0,stats:[
    {l:'Annual Trade',v:'$270 Billion'},
    {l:'% World Trade',v:'5%'},
    {l:'Ships/Year',v:'13,000'},
    {l:'Current Issue',v:'Drought restrictions'},
  ],risk:'MODERATE',whatIf:'Drought: ships diverted via Cape Horn (+3 weeks). US East Coast importers pay premiums.'},
  {id:'bab',name:'Bab-el-Mandeb',lat:12.6,lon:43.3,stats:[
    {l:'EU LNG Imports via route',v:'30%'},
    {l:'% World Trade',v:'20%'},
    {l:'Ships/Year',v:'21,000'},
  ],risk:'HIGH',whatIf:'Closure: Middle East LNG to Europe blocked. Spikes LNG prices. Alternative: Cape (+10 days).'},
  {id:'danish',name:'Danish Straits',lat:57.5,lon:12.0,stats:[
    {l:'Russian Gas to EU (hist.)',v:'65B m³/yr'},
    {l:'% EU Gas',v:'8%'},
    {l:'Status',v:'Flows reduced'},
  ],risk:'LOW',whatIf:'Already affected by Nord Stream damage. Russian gas now rerouted. Baltic states most exposed.'},
  {id:'bosporus',name:'Bosphorus Strait',lat:41.0,lon:28.5,stats:[
    {l:'Oil to Europe',v:'2.5M bbl/day'},
    {l:'Annual Trade',v:'$1.3 Trillion'},
    {l:'Border',v:'Turkey'},
  ],risk:'LOW-MOD',whatIf:'Affects Caspian oil (Azerbaijan, Kazakhstan). BTC pipeline is alternative.'},
  {id:'gibraltar',name:'Gibraltar Strait',lat:36.0,lon:-5.5,stats:[
    {l:'Mediterranean Access',v:'100K ships/yr'},
    {l:'Border',v:'UK/Spain'},
  ],risk:'LOW',whatIf:'Only Atlantic access for Mediterranean. Adds 1-2 days around Iberian Peninsula.'},
  {id:'cape',name:'Cape of Good Hope',lat:-34.5,lon:18.5,stats:[
    {l:'Role',v:'Bypass route'},
    {l:'Extra Time vs Suez',v:'+10-14 days'},
    {l:'Extra Cost',v:'+$500K-1M/ship'},
  ],risk:'LOW',whatIf:'Suez closure forces all Asia-Europe trade via Cape. 2024: Houthi threats drove 40% increase.'},
  {id:'taiwan',name:'Taiwan Strait',lat:24.5,lon:119.5,stats:[
    {l:'Semiconductor Trade',v:'$700B/yr'},
    {l:'TSMC Export Value',v:'$70B/yr'},
    {l:'Global Impact',v:'All advanced chips'},
  ],risk:'CRITICAL',whatIf:'Taiwan conflict: TSMC offline. Global recession within 6 months. Every car, phone, defense system affected.'},
  {id:'lombok',name:'Lombok Strait',lat:-8.5,lon:116.0,stats:[
    {l:'Malacca Alternative',v:'40K ships/yr'},
    {l:'Extra Transit Time',v:'+3-5 days'},
    {l:'Depth',v:'Deepwater route'},
  ],risk:'LOW',whatIf:'Malacca closure shifts traffic here. Indonesia benefits from tolls.'},
  {id:'redsea',name:'Red Sea Corridor',lat:22.0,lon:38.0,stats:[
    {l:'Oil to Europe',v:'4.5M bbl/day'},
    {l:'% World Trade',v:'15%'},
    {l:'Houthi Threat',v:'Active since 2024'},
  ],risk:'HIGH',whatIf:'2024: 100+ vessels hit. Insurance premiums up 500%. Many diverting to Cape (+14 days).'},
];
const zones = [
  {id:'saudi',name:'Saudi Arabia Oil',lat:24.0,lon:45.0,color:'orange',v:'10M bbl/day'},
  {id:'russia',name:'Russia Oil & Gas',lat:55.0,lon:60.0,color:'orange',v:'10M bbl/day + 700B m³ gas'},
  {id:'qatar',name:'Qatar LNG',lat:25.0,lon:51.0,color:'#00AAFF',v:'77 MTPA LNG'},
  {id:'australia',name:'Australia Minerals',lat:-25.0,lon:133.0,color:'#FFD700',v:'900M tons iron ore/yr'},
  {id:'brazil',name:'Brazil Pre-Salt Oil',lat:-25.0,lon:-40.0,color:'orange',v:'3.4M bbl/day'},
  {id:'china',name:'China Manufacturing',lat:35.0,lon:115.0,color:'#FFD700',v:'60% global rare earths'},
  {id:'ukraine',name:'Ukraine Agriculture',lat:49.0,lon:32.0,color:'#00CC66',v:'25M tons wheat/yr'},
  {id:'usmidwest',name:'US Midwest Agriculture',lat:42.0,lon:-95.0,color:'#00CC66',v:'400M tons corn/yr'},
  {id:'chile',name:'Chile Lithium',lat:-30.0,lon:-71.0,color:'#FFD700',v:'40% global lithium'},
  {id:'congo',name:'DR Congo Cobalt',lat:-5.0,lon:25.0,color:'#FFD700',v:'120K tons cobalt/yr'},
  {id:'indonesia',name:'Indonesia Nickel',lat:-5.0,lon:120.0,color:'#FFD700',v:'1.6M tons nickel/yr'},
  {id:'norway',name:'Norway Oil & Gas',lat:62.0,lon:5.0,color:'#00AAFF',v:'1.8M bbl/day'},
  {id:'nigeria',name:'Nigeria Oil',lat:8.0,lon:8.0,color:'orange',v:'1.5M bbl/day'},
  {id:'usgulf',name:'US Gulf LNG',lat:30.0,lon:-93.0,color:'#00AAFF',v:'14 Bcf/day LNG'},
  {id:'safrica',name:'South Africa Minerals',lat:-30.0,lon:25.0,color:'#FFD700',v:'110 MT platinum/yr'},
];

// Add chokepoint markers
chokepoints.forEach(c => {
  const riskColors = {HIGH:'#FF6600',MODERATE:'#FFB800',LOW:'#00CC66',CRITICAL:'#FF3D00'};
  const icon = L.divIcon({
    className: 'chokepoint-marker',
    html: `<div style="width:24px;height:24px;border-radius:50%;background:${riskColors[c.risk]};border:2px solid rgba(255,255,255,0.3);box-shadow:0 0 12px ${riskColors[c.risk]};cursor:pointer"></div>`,
    iconSize: [24,24],
    iconAnchor: [12,12]
  });
  L.marker([c.lat, c.lon], {icon}).addTo(map).on('click', () => showChokepoint(c));
});

// Add zone markers
zones.forEach(z => {
  const icon = L.divIcon({
    className: 'zone-marker',
    html: `<div style="width:16px;height:16px;border-radius:50%;background:${z.color};opacity:0.7;border:1px solid rgba(255,255,255,0.2);cursor:pointer"></div>`,
    iconSize: [16,16],
    iconAnchor: [8,8]
  });
  L.marker([z.lat, z.lon], {icon}).addTo(map).on('click', () => showZone(z));
});

// Add routes as curved lines
const routes = [
  {pts:[[24,45],[26,56.5],[2.5,100.5],[35,115]],color:'orange'},
  {pts:[[24,45],[30.3,32.3]],color:'orange'},
  {pts:[[55,60],[57.5,12]],color:'#00AAFF'},
  {pts:[[30,-93],[9.1,-80],[2.5,100.5]],color:'orange'},
  {pts:[[-25,133],[35,115]],color:'#FFD700'},
  {pts:[[-25,-40],[35,115]],color:'orange'},
  {pts:[[62,5],[57.5,12]],color:'#00AAFF'},
  {pts:[[8,8],[57.5,12]],color:'orange'},
];
routes.forEach(r => {
  L.polyline(r.pts, {color:r.color, weight:1.5, opacity:0.4, dashArray:'4 4'}).addTo(map);
});

// Panel functions
function showChokepoint(c) {
  document.getElementById('panelTitle').textContent = c.name;
  document.getElementById('panelSub').textContent = 'Chokepoint — Risk: ' + c.risk;
  let html = '';
  c.stats.forEach(s => html += `<div class="panel-row"><span class="panel-label">${s.l}</span><span class="panel-value">${s.v}</span></div>`);
  html += `<div class="panel-section"><h4>What If It Closes?</h4><p>${c.whatIf}</p></div>`;
  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}
function showZone(z) {
  document.getElementById('panelTitle').textContent = z.name;
  document.getElementById('panelSub').textContent = 'Resource Zone';
  document.getElementById('panelBody').innerHTML = `<div class="panel-row"><span class="panel-label">Resource</span><span class="panel-value" style="color:${z.color}">${z.v}</span></div>`;
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
}
document.querySelector('.panel-handle').addEventListener('click', closePanel);
</script>
</body>
</html>
