<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Resource Flows — Strategic Trade Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#111;--accent:#FF6600;--text:#e0e0e0;--text2:#888;--border:#222;
  --oil:orange;--gas:#00AAFF;--minerals:#FFD700;--agri:#00CC66;--bypass:#607D8B;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;touch-action:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
header{padding:14px 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
header h1{font-size:14px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
header p{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:0.5px}
#controls{display:flex;gap:8px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;z-index:10}
#controls::-webkit-scrollbar{display:none}
.toggle-btn{flex-shrink:0;padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:10px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;min-height:36px;min-width:70px}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
#mapWrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#map{width:100%;height:100%;cursor:grab;display:block}
#map:active{cursor:grabbing}
.land{fill:#121212;stroke:#1a1a1a;stroke-width:0.5}
.ocean{stroke:#0f0f0f;stroke-width:0.3}
.route{-fill:none;stroke-width:1.5;opacity:0.5;cursor:pointer;transition:opacity .3s}
.route:hover{opacity:1;stroke-width:2.5}
.route.oil{stroke:var(--oil)}
.route.gas{stroke:var(--gas)}
.route.minerals{stroke:var(--minerals)}
.route.agri{stroke:var(--agri)}
.route.bypass{stroke:var(--bypass)}
@keyframes dashFlow{to{stroke-dashoffset:-20}}
.route.flowing{stroke-dasharray:6 6;animation:dashFlow 1.2s linear infinite}
.chokepoint{cursor:pointer}
@keyframes chokepointPulse{
  0%,100%{r:8;opacity:1}
  50%{r:14;opacity:0.3}
}
.chokepoint-ring{animation:chokepointPulse 2s ease-in-out infinite;pointer-events:none}
.chokepoint-dot{fill:var(--accent);pointer-events:none}
.chokepoint:hover .chokepoint-dot{fill:#fff}
.zone{cursor:pointer;opacity:0.8}
.zone:hover{opacity:1}
@keyframes zonePulse{
  0%,100%{opacity:0.5;r:10}
  50%{opacity:0.8;r:12}
}
.zone-dot{pointer-events:none}
#legend{position:absolute;bottom:16px;left:14px;background:rgba(10,10,10,.9);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:5;backdrop-filter:blur(8px)}
#legend h3{font-size:8px;letter-spacing:1.5px;color:var(--text2);margin-bottom:8px;text-transform:uppercase}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:10px;font-family:'Courier New',monospace}
.legend-item:last-child{margin-bottom:0}
.legend-line{width:14px;height:2px;border-radius:1px;flex-shrink:0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#stats{position:absolute;top:12px;right:12px;background:rgba(10,10,10,.9);border:1px solid var(--border);border-radius:10px;padding:8px 12px;z-index:5;backdrop-filter:blur(8px);text-align:right}
.stat-item{display:inline-block;text-align:center;margin-left:10px}
.stat-item:first-child{margin-left:0}
.stat-num{font-size:18px;font-weight:700;color:var(--accent);font-family:'Courier New',monospace;line-height:1}
.stat-lbl{font-size:8px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
#popup{position:absolute;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:20px 18px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:100;max-height:70vh;overflow-y:auto;backdrop-filter:blur(20px)}
#popup.show{transform:translateY(0)}
.popup-handle{width:32px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.popup-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
#popupTitle{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px}
#popupType{font-size:8px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
#closePopup{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.popup-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:10px}
.popup-row:last-child{border-bottom:none}
.popup-lbl{font-size:10px;color:var(--text2);flex-shrink:0}
.popup-val{font-size:11px;font-family:'Courier New',monospace;color:var(--text);text-align:right}
.popup-val.highlight{color:var(--accent)}
.popup-section{margin-top:12px;padding:10px;background:rgba(255,102,0,.07);border:1px solid rgba(255,102,0,.2);border-radius:8px}
.popup-section h4{font-size:8px;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px;text-transform:uppercase}
.popup-section p{font-size:11px;line-height:1.5;color:var(--text)}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.loader{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:768px){
  #popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);bottom:auto;width:400px;border-radius:14px;border:1px solid var(--border);border-top:2px solid var(--accent);max-height:80vh}
  #popup.show{transform:translate(-50%,-50%) scale(1)}
}
</style>
</head>
<body>

      </defs>

      <g id="world">

      <g id="routes"></g>

    <div id="legend">

      <div class="legend-item"><div class="legend-line" style="background:var(--gas)"></div> LNG/Gas</div>

    </div>
    <div id="stats">

    <div id="popup">

</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
// ─── Routes ───────────────────────────────────────────────────────
const routeData = [

  {type:'minerals',d:'M508,332 Q680,295 870,168',flowing:false},

  {type:'gas',d:'M560,55 Q640,80 760,205',flowing:true},
  {type:'bypass',d:'M575,170 Q650,350 530,370',flowing:false},

const routesEl = document.getElementById('routes');
routeData.forEach((r,i)=>{

  p.setAttribute('d',r.d);
  p.setAttribute('class','route '+r.type+(r.flowing?' flowing':''));
  p.setAttribute('data-route',i);
  routesEl.appendChild(p);

// ─── Zones ────────────────────────────────────────────────────────
const zones = [
  {id:'saudi',name:'Saudi Arabia Oil',x:578,y:162,r:8,color:'var(--oil)',resource:'Oil',extractor:'Saudi Aramco',capacity:'10M bbl/day',dest:'Asia 65%, US 15%, Europe 12%'},

// ─── Chokepoints ─────────────────────────────────────────────────
const chokepoints = [
  {id:'hormuz',name:'Strait of Hormuz',x:625,y:168,stats:[{l:'Daily Oil Flow',v:'21M bbl/day'},{l:'% World Oil',v:'20%'},{l:'Width',v:'21 miles'},{l:'Depth',v:'230 ft'}],risk:'HIGH — Iran tensions',whatIf:'Full closure: +$20-40/barrel in days. Europe and Asia scramble. Saudi routes shift south to Bab-el-Mandeb.'},

  {id:'danish',name:'Danish Straits',x:510,y:100,stats:[{l:'Russian Gas to EU',v:'65B m³/yr'},{l:'% EU Gas',v:'8%'},{l:'Route',v:'Russia→Germany'}],risk:'LOW — open',whatIf:'Russian gas flows already shifted via Yamal. Baltic states most exposed.'},
  {id:'bosporus',name:'Bosphorus Strait',x:545,y:132,stats:[{l:'Oil to Europe',v:'2.5M bbl/day'},{l:'Annual Trade',v:'$1.3T'},{l:'Border',v:'Turkey'}],risk:'LOW-MOD',whatIf:'Caspian oil (Azerbaijan, Kazakhstan) to Europe. BTC pipeline is alternative.'},
  {id:'gibraltar',name:'Gibraltar Strait',x:475,y:138,stats:[{l:'Mediterranean Access',v:'100K ships/yr'},{l:'Border',v:'UK/Spain'}],risk:'LOW',whatIf:'Only Atlantic access for Mediterranean. Adds 1-2 days around Iberian Peninsula.'},
  {id:'cape',name:'Cape of Good Hope',x:518,y:372,stats:[{l:'Bypass Route',v:'For Suez/Panama'},{l:'Extra Time',v:'+10-14 days'},{l:'Extra Cost',v:'+$500K/ship'}],risk:'LOW — weather',whatIf:'Suez closure forces all Asia-Europe trade via Cape. 2024: Houthi threats drove 40% increase.'},
  {id:'taiwan',name:'Taiwan Strait',x:845,y:205,stats:[{l:'Semiconductor Trade',v:'$700B/yr'},{l:'TSMC Value',v:'$70B/yr'},{l:'Impact',v:'Global chip shortage'}],risk:'CRITICAL',whatIf:'Taiwan conflict: TSMC offline. Global recession within 6 months. Every car, phone, defense system affected.'},
  {id:'lombok',name:'Lombok Strait',x:800,y:285,stats:[{l:'Malacca Alternative',v:'40K ships/yr'},{l:'Extra vs Malacca',v:'+3-5 days'}],risk:'LOW',whatIf:'Malacca closure shifts traffic here. Indonesia benefits from tolls.'},
  {id:'redsea',name:'Red Sea Corridor',x:570,y:178,stats:[{l:'Oil to Europe',v:'4.5M bbl/day'},{l:'% World Trade',v:'15%'},{l:'Houthi Threat',v:'Active since 2024'}],risk:'HIGH',whatIf:'2024: 100+ vessels hit. Insurance premiums up 500%. Many diverting to Cape (+14 days).'},
];
const chokepointsEl = document.getElementById('chokepoints');
chokepoints.forEach(c=>{
  const g=document.createElementNS(SVG_NS,'g');
  g.setAttribute('class','chokepoint');
  g.setAttribute('data-chokepoint',c.id);
  g.setAttribute('transform',`translate(${c.x},${c.y})`);
  const ring=document.createElementNS(SVG_NS,'circle');
  ring.setAttribute('r',10);
  ring.setAttribute('class','chokepoint-ring');
  ring.setAttribute('fill','var(--accent)');
  ring.setAttribute('opacity','0.3');
  const dot=document.createElementNS(SVG_NS,'circle');
  dot.setAttribute('r',6);
  dot.setAttribute('class','chokepoint-dot');
  g.appendChild(ring);
  g.appendChild(dot);
  chokepointsEl.appendChild(g);
});
// ─── Pan & Zoom ──────────────────────────────────────────────────
let scale=1,tx=0,ty=0,startDist,startScale,startTx,startTy;
let isDragging=false,lastX,lastY;
const mapWrap=document.getElementById('mapWrap');
const mapEl=document.getElementById('map');
function applyTransform(){mapEl.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function getTouchDist(t){const dx=t[0].clientX-t[1].clientX;const dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
mapWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){startDist=getTouchDist(e.touches);startScale=scale}
  else if(e.touches.length===1){isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;startTx=tx;startTy=ty}
},{passive:true});
mapWrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2){const dist=getTouchDist(e.touches);scale=Math.max(0.5,Math.min(4,startScale*(dist/startDist)));applyTransform()}
  else if(e.touches.length===1&&isDragging){tx=startTx+(e.touches[0].clientX-lastX);ty=startTy+(e.touches[0].clientY-lastY);applyTransform()}
},{passive:true});
mapWrap.addEventListener('touchend',()=>{isDragging=false},{passive:true});
mapWrap.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(0.5,Math.min(4,scale-e.deltaY*0.001));applyTransform()},{passive:false});
mapWrap.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;startTx=tx;startTy=ty});
mapWrap.addEventListener('mousemove',e=>{if(!isDragging)return;tx=startTx+(e.clientX-lastX);ty=startTy+(e.clientY-lastY);applyTransform()});
mapWrap.addEventListener('mouseup',()=>{isDragging=false});
mapWrap.addEventListener('mouseleave',()=>{isDragging=false});
// ─── Popup ───────────────────────────────────────────────────────
const popup=document.getElementById('popup');
const popupTitle=document.getElementById('popupTitle');
const popupType=document.getElementById('popupType');
const popupBody=document.getElementById('popupBody');
function showPopup(){popup.classList.add('show')}
function hidePopup(){popup.classList.remove('show')}
document.getElementById('closePopup').addEventListener('click',hidePopup);
document.querySelector('.popup-handle').addEventListener('click',hidePopup);
document.querySelectorAll('.chokepoint').forEach(el=>{
  el.addEventListener('click',()=>{
    const c=chokepoints.find(x=>x.id===el.dataset.chokepoint);
    if(!c)return;
    popupTitle.textContent=c.name;popupType.textContent='Chokepoint';
    let html='';
    c.stats.forEach(s=>html+=`<div class="popup-row"><span class="popup-lbl">${s.l}</span><span class="popup-val">${s.v}</span></div>`);
    html+=`<div class="popup-section"><h4>2026 Risk</h4><p>${c.risk}</p></div>`;
    html+=`<div class="popup-section"><h4>What If It Closes?</h4><p>${c.whatIf}</p></div>`;
    popupBody.innerHTML=html;showPopup();
  });
});
document.querySelectorAll('.zone').forEach(el=>{
  el.addEventListener('click',()=>{
    const z=zones.find(x=>x.id===el.dataset.zone);
    if(!z)return;
    popupTitle.textContent=z.name;popupType.textContent='Resource Zone';
    let html='';
    html+=`<div class="popup-row"><span class="popup-lbl">Resource</span><span class="popup-val highlight">${z.resource}</span></div>`;
    html+=`<div class="popup-row"><span class="popup-lbl">Extractor</span><span class="popup-val">${z.extractor}</span></div>`;
    html+=`<div class="popup-row"><span class="popup-lbl">Capacity</span><span class="popup-val">${z.capacity}</span></div>`;
    html+=`<div class="popup-row"><span class="popup-lbl">Destinations</span><span class="popup-val">${z.dest}</span></div>`;
    popupBody.innerHTML=html;showPopup();
  });
});
const routeDescs={oil:'Crude oil from Middle East, Russia, Americas to refineries in Asia, Europe, US.',gas:'LNG from Qatar, Australia, US Gulf to regasification terminals worldwide.',minerals:'Copper, cobalt, nickel, lithium, rare earths to global manufacturing hubs.',agri:'Wheat, corn, soybeans from Ukraine, US Midwest, Brazil, Argentina.',bypass:'Alternative when primaries blocked. +10-14 days, +$500K/ship.'};
document.querySelectorAll('.route').forEach(el=>{
  el.addEventListener('click',()=>{
    const type=el.className.split(' ').find(c=>['oil','gas','minerals','agri','bypass'].includes(c));
    const typeNames={oil:'OIL',gas:'GAS/LNG',minerals:'MINERALS',agri:'AGRICULTURE',bypass:'BYPASS'};
    popupTitle.textContent=typeNames[type]+' Route';popupType.textContent='Shipping Lane';
    popupBody.innerHTML=`<p style="font-size:12px;line-height:1.6;color:var(--text2)">${routeDescs[type]}</p>`;showPopup();
  });
});
// ─── Layer Toggles ───────────────────────────────────────────────
document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.classList.toggle('active');
    const isActive=btn.classList.contains('active');
    const layerMap={routes:'routes',zones:'zones',chokepoints:'chokepoints'};
    document.getElementById(layerMap[btn.dataset.layer]).style.display=isActive?'block':'none';
  });
});
setTimeout(()=>{document.getElementById('loading').classList.add('hide')},400);
</script>
