<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Resource Flows — Strategic Trade Intelligence</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --accent: #FF6600;
  --accent2: #FF8533;
  --text: #e0e0e0;
  --text2: #888888;
  --border: #2a2a2a;
  --oil: #FF6600;
  --gas: #00AAFF;
  --minerals: #FFD700;
  --agri: #00CC66;
  --bypass: #607D8B;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  touch-action: none;
}
#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
}
header {
  padding: 16px 20px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}
header p {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  letter-spacing: 1px;
}
#controls {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  z-index: 10;
}
#controls::-webkit-scrollbar { display: none; }
.toggle-btn {
  flex-shrink: 0;
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 44px;
  min-width: 80px;
}
.toggle-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
#mapWrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
#map {
  width: 100%; height: 100%;
  cursor: grab;
  transform-origin: center center;
}
#map:active { cursor: grabbing; }
.continent { fill: #0f0f0f; stroke: #1e1e1e; stroke-width: 0.5; }
.country { fill: #141414; stroke: #1a1a1a; stroke-width: 0.3; }
.route {
  fill: none;
  stroke-width: 2;
  opacity: 0.6;
  pointer-events: stroke;
  cursor: pointer;
  transition: opacity 0.3s, stroke-width 0.2s;
}
.route:hover { opacity: 1; stroke-width: 3; }
.route.oil { stroke: var(--oil); }
.route.gas { stroke: var(--gas); }
.route.minerals { stroke: var(--minerals); }
.route.agri { stroke: var(--agri); }
.route.bypass { stroke: var(--bypass); }
@keyframes dashFlow {
  to { stroke-dashoffset: -40; }
}
.route.flowing {
  stroke-dasharray: 8 8;
  animation: dashFlow 1.5s linear infinite;
}
.chokepoint {
  cursor: pointer;
  transition: transform 0.2s;
}
@keyframes pulse {
  0%, 100% { r: 8; opacity: 1; }
  50% { r: 14; opacity: 0.4; }
}
.chokepoint-pulse {
  fill: var(--accent);
  opacity: 0.3;
  animation: pulse 2s ease-in-out infinite;
  pointer-events: none;
}
.chokepoint-dot {
  fill: var(--accent);
  pointer-events: none;
}
.chokepoint:hover .chokepoint-dot { fill: #fff; }
.zone {
  cursor: pointer;
  transition: transform 0.2s, opacity 0.3s;
  opacity: 0.8;
}
.zone:hover { opacity: 1; transform: scale(1.1); }
@keyframes zoneGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.9; }
}
.zone-ring {
  animation: zoneGlow 3s ease-in-out infinite;
  pointer-events: none;
}
.zone-dot { pointer-events: none; }
#legend {
  position: absolute;
  bottom: 20px;
  left: 16px;
  background: rgba(10,10,10,0.92);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  backdrop-filter: blur(10px);
  z-index: 5;
  min-width: 140px;
}
#legend h3 {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text2);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 11px;
  color: var(--text);
  font-family: 'Courier New', monospace;
}
.legend-item:last-child { margin-bottom: 0; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-line {
  width: 16px; height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
}
#stats {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(10,10,10,0.92);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  backdrop-filter: blur(10px);
  z-index: 5;
  text-align: right;
}
#stats .num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Courier New', monospace;
  line-height: 1;
}
#stats .label {
  font-size: 9px;
  color: var(--text2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}
.stat-row { display: flex; justify-content: flex-end; gap: 12px; }
.stat-item { text-align: right; }
#popup {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.97);
  border-top: 2px solid var(--accent);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 100;
  max-height: 70vh;
  overflow-y: auto;
  backdrop-filter: blur(20px);
}
#popup.show { transform: translateY(0); }
#popupHandle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
#popupHeader {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}
#popupTitle {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}
#popupType {
  font-size: 9px;
  color: var(--text2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}
#closePopup {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.popup-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.popup-row:last-child { border-bottom: none; }
.popup-label {
  font-size: 11px;
  color: var(--text2);
  flex-shrink: 0;
}
.popup-value {
  font-size: 12px;
  font-family: 'Courier New', monospace;
  color: var(--text);
  text-align: right;
}
.popup-value.highlight { color: var(--accent); }
.popup-section {
  margin-top: 16px;
  padding: 14px;
  background: rgba(255,102,0,0.08);
  border: 1px solid rgba(255,102,0,0.2);
  border-radius: 10px;
}
.popup-section h4 {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.popup-section p {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
}
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 200;
  transition: opacity 0.5s;
}
#loading.hide { opacity: 0; pointer-events: none; }
.loader {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (min-width: 768px) {
  #popup {
    position: fixed;
    bottom: auto;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: 440px;
    border-radius: 16px;
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    max-height: 80vh;
  }
  #popup.show { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Global Resource Flows</h1>
    <p>Strategic Trade Intelligence — Tap markers to explore</p>
  </header>
  <div id="controls">
    <button class="toggle-btn active" data-layer="routes">Routes</button>
    <button class="toggle-btn active" data-layer="zones">Zones</button>
    <button class="toggle-btn active" data-layer="chokepoints">Chokepoints</button>
  </div>
  <div id="mapWrap">
    <svg id="map" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
      <defs>

      <div class="legend-item"><div class="legend-line" style="background:var(--agri)"></div> Agriculture</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--bypass)"></div> Bypass Route</div>
      <div class="legend-item" style="margin-top:8px"><div class="legend-dot" style="background:var(--accent)"></div> Chokepoint</div>
    </div>
    <div id="stats">
      <div class="stat-row">
        <div class="stat-item"><div class="num">12</div><div class="label">Chokepoints</div></div>
        <div class="stat-item"><div class="num">24</div><div class="label">Zones</div></div>
        <div class="stat-item"><div class="num">18</div><div class="label">Routes</div></div>
      </div>
    </div>
    <div id="popup">
      <div id="popupHandle"></div>
      <div id="popupHeader">
        <div>
          <div id="popupTitle">Title</div>
          <div id="popupType">Type</div>
        </div>
        <button id="closePopup">×</button>
      </div>
      <div id="popupBody"></div>
    </div>
  </div>
</div>
<div id="loading"><div class="loader"></div></div>

const chokepointsLayer = document.getElementById('chokepointsLayer');
chokepoints.forEach(c => {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('class', 'chokepoint');
  g.setAttribute('data-chokepoint', c.id);
  g.setAttribute('transform', `translate(${c.x},${c.y})`);
  g.setAttribute('transform', `translate(${c.x},${c.y})`);
  const pulse = document.createElementNS(SVG_NS, 'circle');
  pulse.setAttribute('r', 12);
  pulse.setAttribute('class', 'chokepoint-pulse');
  pulse.setAttribute('vector-effect', 'non-scaling-stroke');
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('r', 8);
  dot.setAttribute('class', 'chokepoint-dot');
  dot.setAttribute('vector-effect', 'non-scaling-stroke');
  g.appendChild(pulse);
  g.appendChild(dot);
  chokepointsLayer.appendChild(g);
});
// ─── Pan & Zoom ─────────────────────────────────────────────────
let scale = 1, tx = 0, ty = 0;
let startDist = 0, startScale = 1, startTx, startTy;
let isDragging = false, lastX, lastY;
const mapEl = document.getElementById('map');
const mapWrap = document.getElementById('mapWrap');
function applyTransform() {
  mapEl.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
mapWrap.addEventListener('touchstart', e => {
  if(e.touches.length === 2) {
    startDist = getTouchDist(e.touches);
    startScale = scale;
  } else if(e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    startTx = tx; startTy = ty;
  }
}, {passive: true});
mapWrap.addEventListener('touchmove', e => {
  if(e.touches.length === 2) {
    const dist = getTouchDist(e.touches);
    scale = Math.max(0.5, Math.min(4, startScale * (dist/startDist)));
    applyTransform();
  } else if(e.touches.length === 1 && isDragging) {
    tx = startTx + (e.touches[0].clientX - lastX);
    ty = startTy + (e.touches[0].clientY - lastY);
    applyTransform();
  }
}, {passive: true});
mapWrap.addEventListener('touchend', () => { isDragging = false; }, {passive: true});
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.max(0.5, Math.min(4, scale - e.deltaY * 0.001));
  applyTransform();
}, {passive: false});
// Mouse drag
mapWrap.addEventListener('mousedown', e => {
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  startTx = tx; startTy = ty;
});
mapWrap.addEventListener('mousemove', e => {
  if(!isDragging) return;
  tx = startTx + (e.clientX - lastX);
  ty = startTy + (e.clientY - lastY);
  applyTransform();
});
mapWrap.addEventListener('mouseup', () => { isDragging = false; });
mapWrap.addEventListener('mouseleave', () => { isDragging = false; });
// ─── Popups ───────────────────────────────────────────────────────
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupType = document.getElementById('popupType');
const popupBody = document.getElementById('popupBody');
const closeBtn = document.getElementById('closePopup');
function showPopup() { popup.classList.add('show'); }
function hidePopup() { popup.classList.remove('show'); }
closeBtn.addEventListener('click', hidePopup);
popup.addEventListener('click', e => { if(e.target === popup) hidePopup(); });
document.getElementById('popupHandle').addEventListener('click', hidePopup);
// Chokepoint clicks
document.querySelectorAll('.chokepoint').forEach(el => {
  el.addEventListener('click', () => {
    const id = el.dataset.chokepoint;
    const c = chokepoints.find(x => x.id === id);
    if(!c) return;
    popupTitle.textContent = c.name;
    popupType.textContent = 'Chokepoint';
    let html = '';
    c.stats.forEach(s => html += `<div class="popup-row"><span class="popup-label">${s.l}</span><span class="popup-value">${s.v}</span></div>`);
    html += `<div class="popup-section"><h4>2026 Risk Assessment</h4><p>${c.risk}</p></div>`;
    html += `<div class="popup-section"><h4>What If It Closes?</h4><p>${c.whatIf}</p></div>`;
    popupBody.innerHTML = html;
    showPopup();
  });
});
// Zone clicks
document.querySelectorAll('.zone').forEach(el => {
  el.addEventListener('click', () => {
    const id = el.dataset.zone;
    const z = zones.find(x => x.id === id);
    if(!z) return;
    popupTitle.textContent = z.name;
    popupType.textContent = 'Resource Zone';
    let html = '';
    html += `<div class="popup-row"><span class="popup-label">Resource</span><span class="popup-value highlight">${z.resource}</span></div>`;
    html += `<div class="popup-row"><span class="popup-label">Extractor</span><span class="popup-value">${z.extractor}</span></div>`;
    html += `<div class="popup-row"><span class="popup-label">Capacity</span><span class="popup-value">${z.capacity}</span></div>`;
    html += `<div class="popup-row"><span class="popup-label">Destinations</span><span class="popup-value">${z.dest}</span></div>`;
    popupBody.innerHTML = html;
    showPopup();
  });
});
// Route clicks
const routeDescs = {
  oil: 'Crude oil and refined products flow from Middle East, Russia, and Americas to refineries in Asia, Europe, and the US. Tankers average 500K DWT.',
  gas: 'Liquefied natural gas transported in cryogenic vessels from Qatar, Australia, US Gulf, and Russia to regasification terminals worldwide.',
  minerals: 'Copper, cobalt, nickel, lithium, and rare earth elements ship from Chile, Congo, Indonesia, and South Africa to manufacturing hubs.',
  agri: 'Wheat, corn, and soybeans flow from Ukraine, US Midwest, Brazil, and Argentina to food-deficient regions and livestock operations.',
  bypass: 'Alternative route when primary chokepoints are blocked. Adds 10-14 days and $500K-1M in extra fuel costs per voyage.'
};
document.querySelectorAll('.route').forEach(el => {
  el.addEventListener('click', () => {
    const type = el.className.split(' ').find(c => ['oil','gas','minerals','agri','bypass'].includes(c));
    const typeNames = {oil:'OIL',gas:'GAS/LNG',minerals:'MINERALS',agri:'AGRICULTURE',bypass:'BYPASS ROUTE'};
    popupTitle.textContent = typeNames[type] + ' Route';
    popupType.textContent = 'Shipping Lane';
    popupBody.innerHTML = `<p style="font-size:13px;line-height:1.7;color:var(--text2)">${routeDescs[type]}</p>`;
    showPopup();
  });
});
// ─── Layer Toggles ─────────────────────────────────────────────────
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = btn.dataset.layer;
    btn.classList.toggle('active');
    const isActive = btn.classList.contains('active');
    const layerMap = {routes:'routesLayer',zones:'zonesLayer',chokepoints:'chokepointsLayer'};
    const el = document.getElementById(layerMap[layer]);
    el.style.display = isActive ? 'block' : 'none';
  });
});
// ─── Init ─────────────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('loading').classList.add('hide');
}, 400);
